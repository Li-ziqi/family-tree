<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
    <title>桂林市灵川县老安村李家族谱</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.85);
            --danger-color: #c0392b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--primary-color);
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: pan-x pan-y;
            overflow-x: hidden;
        }

        .header {
            text-align: center; padding: 20px 15px 5px;
        }
        .header h1 { font-size: 22px; font-weight: 300; letter-spacing: 3px; margin: 0; }
        .loading-text { color: #aaa; font-size: 13px; margin-top: 5px; }

        .tree-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 10px 15px 60px;
            box-sizing: border-box;
            scrollbar-width: none;
            min-height: 300px;
        }
        .tree-container::-webkit-scrollbar { display: none; }

        .tree {
            display: flex;
            justify-content: flex-start;
            min-width: max-content;
        }

        .tree ul {
            padding-top: 25px;
            position: relative;
            display: flex;
            justify-content: center;
            padding-left: 0;
            margin: 0;
        }

        .tree li {
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 30px 6px 0;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tree li::before,
        .tree li::after {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 1.5px solid #bdc3c7;
            width: 50%;
            height: 30px;
        }
        .tree li::after {
            right: auto;
            left: 50%;
            border-left: 1.5px solid #bdc3c7;
        }
        .tree li:only-child::after,
        .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before,
        .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before {
            border-right: 1.5px solid #bdc3c7;
            border-radius: 0 8px 0 0;
        }
        .tree li:first-child::after { border-radius: 8px 0 0 0; }
        .tree ul ul::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            border-left: 1.5px solid #bdc3c7;
            width: 0;
            height: 30px;
            transform: translateX(-50%);
        }

        .family-node {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .person {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-width: 75px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 2;
        }
        .person:active { transform: scale(0.96); }

        .person img {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
            pointer-events: none;
        }

        .person .name {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .action-btns {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            pointer-events: auto;
        }

        .add-btn,
        .spouse-btn {
            background: #fff;
            color: var(--accent-color);
            border: 1px solid #eaeaea;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            line-height: 26px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.06);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            -webkit-tap-highlight-color: transparent;
            z-index: 5;
        }
        .add-btn:active,
        .spouse-btn:active {
            background: var(--accent-color);
            color: #fff;
            transform: scale(0.9);
        }

        /* 配偶卡片 */
        .spouse-person {
            opacity: 0.95;
            border-color: rgba(212,175,55,0.2);
        }
        .spouse-person img {
            width: 48px;
            height: 64px;
            border-radius: 8px;
            background: #eee;
        }
        .spouse-person .name {
            font-size: 12px;
            margin-top: 5px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 20px;
        }
        .modal {
            background: #fff;
            padding: 20px;
            border-radius: 18px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transform: translateY(20px);
            transition: transform 0.3s;
            text-align: center;
        }
        .modal h2 {
            margin: 0 0 12px;
            font-size: 17px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #666;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }
        .form-group input[type="text"]:focus {
            border-color: var(--accent-color);
        }
        .form-group input[type="file"] {
            width: 100%;
            font-size: 13px;
        }
        .gender-select {
            display: flex;
            gap: 8px;
        }
        .gender-select button {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        .gender-select button.active {
            border-color: var(--accent-color);
            background: rgba(212,175,55,0.1);
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }
        .btn-submit {
            background: var(--primary-color);
            color: #fff;
        }
        .btn-delete {
            background: var(--danger-color);
            color: #fff;
        }
        .btn-submit:active,
        .btn-delete:active {
            opacity: 0.8;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .error-text {
            color: #c0392b;
            font-size: 12px;
            display: none;
        }

        .photo-preview {
            max-width: 120px;
            max-height: 160px;
            border-radius: 10px;
            margin: 8px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .photo-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>李家族谱</h1>
        <div class="loading-text" id="loadingIndicator">加载中...</div>
    </div>

    <div class="tree-container">
        <div class="tree" id="familyTree"></div>
    </div>

    <!-- 添加成员模态框 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2 id="modalTitle">添加成员</h2>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="newName" placeholder="请输入姓名">
            </div>
            <div class="form-group" id="genderGroup" style="display:none;">
                <label>性别</label>
                <div class="gender-select">
                    <button type="button" id="genderMale" onclick="setGender('male', this)">男</button>
                    <button type="button" id="genderFemale" onclick="setGender('female', this)">女</button>
                </div>
            </div>
            <div class="form-group">
                <label>上传照片</label>
                <input type="file" id="newPhoto" accept="image/*">
            </div>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-submit" onclick="submitForm()">确认添加</button>
            </div>
            <p class="error-text" id="errorMsg"></p>
        </div>
    </div>

    <!-- 编辑成员模态框（含删除按钮） -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2 id="editModalTitle">编辑资料</h2>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="editName" placeholder="请输入姓名">
            </div>
            <div class="form-group" id="editGenderGroup" style="display:none;">
                <label>性别</label>
                <div class="gender-select">
                    <button type="button" id="editGenderMale" onclick="setEditGender('male', this)">男</button>
                    <button type="button" id="editGenderFemale" onclick="setEditGender('female', this)">女</button>
                </div>
            </div>
            <div class="form-group">
                <label>照片</label>
                <div id="editPhotoContainer">
                    <img id="editPhotoPreview" class="photo-preview" src="" alt="照片" style="display:none;">
                    <p id="editNoPhotoText" style="color:#999;">暂无照片</p>
                </div>
                <div class="photo-actions" id="editPhotoActions">
                    <button class="btn btn-submit" onclick="triggerEditPhotoUpload()">上传/替换照片</button>
                    <button class="btn btn-cancel" style="background:#c0392b;color:white;" onclick="deleteEditPhoto()">删除照片</button>
                </div>
                <input type="file" id="editPhotoInput" accept="image/*" style="display:none;" onchange="handleEditPhotoReplace(event)">
            </div>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn btn-delete" id="editDeleteBtn" onclick="handleDeleteFromEdit()">删除</button>
                <button class="btn btn-submit" onclick="saveEdit()">保存修改</button>
            </div>
            <p class="error-text" id="editErrorMsg"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script>
        (function() {

            // ==================== 配置 ====================
            const SUPABASE_URL = 'https://yihrrkvridiyfdiabkob.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_bra_sHf-dNI1DPaLo03WSw_s-KafG2-';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const DEFAULT_PHOTO = 'default-avatar.png';

            // ==================== 全局状态 ====================
            let currentNodeId = null;      // 添加成员用
            let currentMode = 'child';
            let selectedGender = null;
            let allMembers = [];

            // 编辑状态
            let editMemberId = null;
            let editType = 'member';
            let editSelectedGender = null;
            let editCurrentPhotoUrl = null;

            // ==================== 工具函数 ====================
            function fileToBase64(file) {
                return new Promise((resolve) => {
                    if (!file) return resolve(null);
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }

            function showLoading(show) {
                document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
            }

            // ==================== 编辑模态框（含删除按钮） ====================
            function openEditModal(memberId, type) {
                const member = allMembers.find(m => m.id === memberId);
                if (!member) return;

                editMemberId = memberId;
                editType = type;

                document.getElementById('editErrorMsg').style.display = 'none';
                const title = document.getElementById('editModalTitle');
                const nameInput = document.getElementById('editName');
                const genderGroup = document.getElementById('editGenderGroup');
                const photoPreview = document.getElementById('editPhotoPreview');
                const noPhotoText = document.getElementById('editNoPhotoText');
                const deleteBtn = document.getElementById('editDeleteBtn');

                if (type === 'member') {
                    title.textContent = '编辑成员';
                    nameInput.value = member.name || '';
                    genderGroup.style.display = 'block';
                    editSelectedGender = member.gender || null;
                    document.querySelectorAll('#editGenderGroup .gender-select button').forEach(b => b.classList.remove('active'));
                    if (member.gender === 'male') document.getElementById('editGenderMale').classList.add('active');
                    if (member.gender === 'female') document.getElementById('editGenderFemale').classList.add('active');
                    editCurrentPhotoUrl = member.photo_url || null;

                    // 控制删除按钮：根节点不可删除
                    if (member.parent_id === null) {
                        deleteBtn.style.display = 'none';
                    } else {
                        deleteBtn.style.display = 'inline-block';
                        deleteBtn.textContent = '删除该成员';
                    }
                } else {
                    title.textContent = '编辑配偶';
                    nameInput.value = member.spouse_name || '';
                    genderGroup.style.display = 'none';
                    editSelectedGender = null;
                    editCurrentPhotoUrl = member.spouse_photo_url || null;
                    deleteBtn.style.display = 'inline-block';
                    deleteBtn.textContent = '删除配偶';
                }

                // 照片显示
                if (editCurrentPhotoUrl && editCurrentPhotoUrl !== DEFAULT_PHOTO) {
                    photoPreview.src = editCurrentPhotoUrl;
                    photoPreview.style.display = 'block';
                    noPhotoText.style.display = 'none';
                } else {
                    photoPreview.style.display = 'none';
                    noPhotoText.style.display = 'block';
                }

                document.getElementById('editModal').classList.add('active');
            }

            function closeEditModal() {
                document.getElementById('editModal').classList.remove('active');
                editMemberId = null;
            }

            function setEditGender(gender, btn) {
                editSelectedGender = gender;
                document.querySelectorAll('#editGenderGroup .gender-select button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            function triggerEditPhotoUpload() {
                document.getElementById('editPhotoInput').click();
            }

            async function handleEditPhotoReplace(event) {
                const file = event.target.files[0];
                if (!file) return;
                const base64 = await fileToBase64(file);
                editCurrentPhotoUrl = base64;
                const preview = document.getElementById('editPhotoPreview');
                preview.src = base64;
                preview.style.display = 'block';
                document.getElementById('editNoPhotoText').style.display = 'none';
            }

            function deleteEditPhoto() {
                if (!confirm('确定要删除当前照片吗？')) return;
                editCurrentPhotoUrl = null;
                document.getElementById('editPhotoPreview').style.display = 'none';
                document.getElementById('editNoPhotoText').style.display = 'block';
            }

            // 编辑窗口中的“删除”按钮
            function handleDeleteFromEdit() {
                if (editType === 'member') {
                    if (confirm('确定要删除该成员及其所有后代吗？此操作不可恢复。')) {
                        deleteMember(editMemberId);
                        closeEditModal();
                    }
                } else {
                    if (confirm('确定要删除该配偶吗？')) {
                        clearSpouse(editMemberId);
                        closeEditModal();
                    }
                }
            }

            async function saveEdit() {
                const name = document.getElementById('editName').value.trim();
                if (!name) {
                    document.getElementById('editErrorMsg').textContent = '姓名不能为空';
                    document.getElementById('editErrorMsg').style.display = 'block';
                    return;
                }

                if (editType === 'member' && !editSelectedGender) {
                    document.getElementById('editErrorMsg').textContent = '请选择性别';
                    document.getElementById('editErrorMsg').style.display = 'block';
                    return;
                }

                if (editType === 'member') {
                    const { error } = await supabase
                        .from('family_members')
                        .update({
                            name: name,
                            gender: editSelectedGender,
                            photo_url: editCurrentPhotoUrl
                        })
                        .eq('id', editMemberId);
                    if (error) { alert('修改失败：' + error.message); return; }
                } else {
                    const { error } = await supabase
                        .from('family_members')
                        .update({
                            spouse_name: name,
                            spouse_photo_url: editCurrentPhotoUrl
                        })
                        .eq('id', editMemberId);
                    if (error) { alert('修改配偶失败：' + error.message); return; }
                }

                closeEditModal();
                await loadTreeData();
            }

            // ==================== 删除操作 ====================
            async function clearSpouse(memberId) {
                const { error } = await supabase
                    .from('family_members')
                    .update({ spouse_name: null, spouse_photo_url: null })
                    .eq('id', memberId);
                if (error) {
                    alert('删除配偶失败：' + error.message);
                } else {
                    await loadTreeData();
                }
            }

            async function deleteMember(memberId) {
                const member = allMembers.find(m => m.id === memberId);
                if (member && member.parent_id === null) {
                    alert('祖先节点不可删除');
                    return;
                }

                function getDescendantIds(pid) {
                    let ids = [];
                    const children = allMembers.filter(m => m.parent_id === pid);
                    children.forEach(c => {
                        ids.push(c.id);
                        ids = ids.concat(getDescendantIds(c.id));
                    });
                    return ids;
                }

                const idsToDelete = [memberId, ...getDescendantIds(memberId)];
                const { error } = await supabase
                    .from('family_members')
                    .delete()
                    .in('id', idsToDelete);
                if (error) {
                    alert('删除失败：' + error.message);
                } else {
                    await loadTreeData();
                }
            }

            // ==================== 添加成员模态框 ====================
            function setGender(gender, btn) {
                selectedGender = gender;
                document.querySelectorAll('#addModal .gender-select button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            function openModal(nodeId, mode) {
                currentNodeId = nodeId;
                currentMode = mode;
                selectedGender = null;
                if (mode === 'child') {
                    document.getElementById('modalTitle').textContent = '添加后代';
                    document.getElementById('genderGroup').style.display = 'block';
                    document.querySelectorAll('#addModal .gender-select button').forEach(b => b.classList.remove('active'));
                } else {
                    document.getElementById('modalTitle').textContent = '添加配偶';
                    document.getElementById('genderGroup').style.display = 'none';
                }
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('addModal').classList.add('active');
            }

            function closeModal() {
                document.getElementById('addModal').classList.remove('active');
                document.getElementById('newName').value = '';
                document.getElementById('newPhoto').value = '';
                currentNodeId = null;
            }

            async function submitForm() {
                const name = document.getElementById('newName').value.trim();
                if (!name) {
                    document.getElementById('errorMsg').textContent = '请输入姓名';
                    document.getElementById('errorMsg').style.display = 'block';
                    return;
                }
                if (currentMode === 'child' && !selectedGender) {
                    document.getElementById('errorMsg').textContent = '请选择性别';
                    document.getElementById('errorMsg').style.display = 'block';
                    return;
                }

                const photoFile = document.getElementById('newPhoto').files[0];
                let photoUrl = null;
                if (photoFile) photoUrl = await fileToBase64(photoFile);

                if (currentMode === 'child') {
                    const { error } = await supabase.from('family_members').insert({
                        parent_id: currentNodeId,
                        name: name,
                        photo_url: photoUrl || null,
                        gender: selectedGender,
                        spouse_name: null,
                        spouse_photo_url: null
                    });
                    if (error) { alert('添加失败：' + error.message); return; }
                } else {
                    const { error } = await supabase
                        .from('family_members')
                        .update({
                            spouse_name: name,
                            spouse_photo_url: photoUrl || null
                        })
                        .eq('id', currentNodeId);
                    if (error) { alert('添加配偶失败：' + error.message); return; }
                }

                closeModal();
                await loadTreeData();
            }

            // ==================== 数据加载与渲染 ====================
            async function loadTreeData() {
                showLoading(true);
                const { data, error } = await supabase
                    .from('family_members')
                    .select('*')
                    .order('created_at', { ascending: true });
                if (error) {
                    console.error('加载失败:', error);
                    alert('无法连接到数据库');
                    showLoading(false);
                    return;
                }
                allMembers = data || [];
                renderTree();
                showLoading(false);
            }

            function getMemberTitle(member) {
                if (member.parent_id === null) return '';
                const siblings = allMembers.filter(m => m.parent_id === member.parent_id);
                siblings.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                const index = siblings.findIndex(s => s.id === member.id);
                if (index === -1) return '';
                const orderList = ['一', '二', '三', '四', '五'];
                const orderStr = orderList[index] || `${index + 1}`;
                const genderChar = member.gender === 'male' ? '子' : '女';
                return `${orderStr}${genderChar}：`;
            }

            function buildFamilyNodeDOM(member) {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'family-node';

                // ---- 主成员卡片 ----
                const mainCard = document.createElement('div');
                mainCard.className = 'person';
                mainCard.setAttribute('data-id', member.id);
                mainCard.setAttribute('data-type', 'member');
                const photo = member.photo_url || DEFAULT_PHOTO;
                const titlePrefix = getMemberTitle(member);
                const displayName = titlePrefix + member.name;
                mainCard.innerHTML = `
                    <img src="${photo}" alt="${member.name}" onerror="this.src='${DEFAULT_PHOTO}'">
                    <span class="name">${displayName}</span>
                    <div class="action-btns">
                        <div class="add-btn" data-action="add-child">+</div>
                        <div class="spouse-btn" data-action="add-spouse">💑</div>
                    </div>
                `;

                // 按钮事件
                mainCard.querySelector('.add-btn').onclick = function(e) {
                    e.stopPropagation();
                    openModal(member.id, 'child');
                };
                mainCard.querySelector('.spouse-btn').onclick = function(e) {
                    e.stopPropagation();
                    openModal(member.id, 'spouse');
                };

                // 单击卡片打开编辑
                mainCard.addEventListener('click', function(e) {
                    if (e.target.closest('.add-btn') || e.target.closest('.spouse-btn')) return;
                    openEditModal(member.id, 'member');
                });

                nodeDiv.appendChild(mainCard);

                // ---- 配偶卡片 ----
                if (member.spouse_name) {
                    const spouseCard = document.createElement('div');
                    spouseCard.className = 'person spouse-person';
                    spouseCard.setAttribute('data-id', member.id);
                    spouseCard.setAttribute('data-type', 'spouse');
                    const spousePhoto = member.spouse_photo_url || DEFAULT_PHOTO;
                    spouseCard.innerHTML = `
                        <img src="${spousePhoto}" alt="${member.spouse_name}" onerror="this.src='${DEFAULT_PHOTO}'">
                        <span class="name">配偶：${member.spouse_name}</span>
                    `;

                    spouseCard.addEventListener('click', function(e) {
                        openEditModal(member.id, 'spouse');
                    });

                    nodeDiv.appendChild(spouseCard);
                }

                return nodeDiv;
            }

            function renderTree() {
                const treeContainer = document.getElementById('familyTree');
                treeContainer.innerHTML = '';

                const roots = allMembers.filter(m => m.parent_id === null);
                if (roots.length === 0) {
                    treeContainer.innerHTML = '<p style="text-align:center;color:#999;">族谱数据为空</p>';
                    return;
                }

                const rootUl = document.createElement('ul');
                roots.forEach(root => rootUl.appendChild(buildNodeDOM(root)));
                treeContainer.appendChild(rootUl);
            }

            function buildNodeDOM(member) {
                const li = document.createElement('li');
                li.appendChild(buildFamilyNodeDOM(member));
                const children = allMembers.filter(m => m.parent_id === member.id);
                if (children.length > 0) {
                    const childUl = document.createElement('ul');
                    children.forEach(child => childUl.appendChild(buildNodeDOM(child)));
                    li.appendChild(childUl);
                }
                return li;
            }

            // ==================== 启动 ====================
            window.addEventListener('DOMContentLoaded', loadTreeData);

            // 暴露函数到全局
            window.openModal = openModal;
            window.closeModal = closeModal;
            window.submitForm = submitForm;
            window.setGender = setGender;
            window.closeEditModal = closeEditModal;
            window.saveEdit = saveEdit;
            window.setEditGender = setEditGender;
            window.triggerEditPhotoUpload = triggerEditPhotoUpload;
            window.handleEditPhotoReplace = handleEditPhotoReplace;
            window.deleteEditPhoto = deleteEditPhoto;
            window.handleDeleteFromEdit = handleDeleteFromEdit;

        })();
    </script>
</body>
</html>
